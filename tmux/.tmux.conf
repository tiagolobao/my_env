# tmux configuration file
# Basic settings for a productive workflow

# Enable mouse support
set -g mouse on

# Set default terminal type
set -g default-terminal "screen-256color"

# Renumber windows when a window is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Use vi mode for copy/paste
setw -g mode-keys vi

# Status bar customization
set -g status-position bottom
set -g status-style bg=black,fg=white
set -g status-left "#[fg=green]#H #[fg=white]• #[fg=yellow]#S "
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M"

# Window status format
setw -g window-status-format "#[fg=white]#I:#W"
setw -g window-status-current-format "#[fg=yellow,bold]#I:#W"

# Enable focus events for terminal applications
set -g focus-events on

# Set escape time for better vim integration
set -sg escape-time 10
